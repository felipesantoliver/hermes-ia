name: Build Hermes-ia Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências do backend
        run: pip install -r backend\requirements.txt

      - name: Gerar Hermes-ia.exe (build.py cuida do resto)
        env:
          PYTHONIOENCODING: utf-8
        run: python build.py

      - name: Instalar Inno Setup
        run: choco install innosetup -y

      - name: Compilar o instalador (.exe final)
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\HermesSetup.iss'

      - name: Publicar o instalador como artifact do workflow
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-ia-Setup
          path: installer_output\*.exe

      - name: Criar Release no GitHub (só quando for uma tag v*)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output\*.exe